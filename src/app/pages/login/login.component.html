<div class="mx-auto max-w-md px-4 pb-16 pt-10 sm:px-6 lg:px-8">
  <div class="text-center">
    <p
      class="text-xs font-semibold uppercase tracking-wider text-teal-600 dark:text-teal-400"
    >
      Sign in
    </p>
    <h1
      class="mt-1 text-2xl font-semibold tracking-tight text-slate-900 dark:text-white"
    >
      CivicAlert
    </h1>
    <p class="mt-2 text-sm text-slate-600 dark:text-slate-400">
      <span class="font-medium text-slate-700 dark:text-slate-300">Alerts by your neighbors, for your neighbors.</span>.
    </p>
  </div>

  <form
    class="mt-8 flex flex-col gap-4 rounded-2xl border border-slate-200/80 bg-white p-6 shadow-sm dark:border-slate-700 dark:bg-slate-900"
    (ngSubmit)="submit()"
  >
    @if (error(); as err) {
      <p
        class="rounded-lg bg-rose-50 px-3 py-2 text-sm text-rose-800 dark:bg-rose-950/50 dark:text-rose-200"
        role="alert"
      >
        {{ err }}
      </p>
    }

    <label class="block">
      <span class="text-xs font-medium text-slate-600 dark:text-slate-400"
        >Email</span
      >
      <input
        type="email"
        name="email"
        required
        autocomplete="username"
        [(ngModel)]="email"
        class="mt-1 w-full rounded-lg border border-slate-200 bg-white px-3 py-2 text-sm dark:border-slate-600 dark:bg-slate-950"
      />
    </label>

    <label class="block">
      <span class="text-xs font-medium text-slate-600 dark:text-slate-400"
        >Password</span
      >
      <input
        type="password"
        name="password"
        required
        autocomplete="current-password"
        [(ngModel)]="password"
        class="mt-1 w-full rounded-lg border border-slate-200 bg-white px-3 py-2 text-sm dark:border-slate-600 dark:bg-slate-950"
      />
    </label>

    <button
      type="submit"
      class="rounded-xl bg-teal-600 px-4 py-2.5 text-sm font-medium text-white hover:bg-teal-500 disabled:opacity-60"
      [disabled]="busy()"
    >
      {{ busy() ? 'Signing in…' : 'Sign in' }}
    </button>
  </form>

  <p class="mt-6 text-center text-sm">
    <a
      routerLink="/"
      class="font-medium text-teal-600 hover:text-teal-500 dark:text-teal-400"
    >
      ← Back to issues
    </a>
  </p>
</div>
