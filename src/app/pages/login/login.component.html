<div class="mx-auto max-w-md px-4 pb-16 pt-10 sm:px-6 lg:px-8">
  <div class="text-center">
    <p
      class="text-xs font-semibold uppercase tracking-wider text-[color:var(--brand)]"
    >
      Sign in
    </p>
    <h1
      class="mt-1 text-2xl font-semibold tracking-tight text-[color:var(--text)]"
    >
      CivicAlert
    </h1>
    <p class="mt-2 text-sm text-[color:var(--muted)]">
      <span class="font-medium text-[color:var(--text)]"
        >Alerts by your neighbors, for your neighbors.</span
      >
    </p>
  </div>

  <form
    class="mt-8 flex flex-col gap-4 rounded-2xl border border-[color:var(--line)] bg-[color:var(--panel)] p-6 shadow-[0_18px_40px_rgba(18,42,36,0.06)]"
    (ngSubmit)="submit()"
  >
    @if (error(); as err) {
      <p
        class="rounded-lg border border-[color:var(--danger-border)] bg-[color:var(--danger-soft)] px-3 py-2 text-sm text-[color:var(--danger-ink)]"
        role="alert"
      >
        {{ err }}
      </p>
    }

    <label class="block">
      <span class="text-xs font-medium text-[color:var(--muted)]">Email</span>
      <input
        type="email"
        name="email"
        required
        autocomplete="username"
        [(ngModel)]="email"
        class="mt-1 w-full rounded-lg border border-[color:var(--line)] bg-[color:var(--surface-input)] px-3 py-2 text-sm text-[color:var(--text)] outline-none focus:border-[color:var(--brand)] focus:ring-2 focus:ring-[color:var(--brand-soft)]"
      />
    </label>

    <label class="block">
      <span class="text-xs font-medium text-[color:var(--muted)]"
        >Password</span
      >
      <input
        type="password"
        name="password"
        required
        autocomplete="current-password"
        [(ngModel)]="password"
        class="mt-1 w-full rounded-lg border border-[color:var(--line)] bg-[color:var(--surface-input)] px-3 py-2 text-sm text-[color:var(--text)] outline-none focus:border-[color:var(--brand)] focus:ring-2 focus:ring-[color:var(--brand-soft)]"
      />
    </label>

    <button
      type="submit"
      class="rounded-xl bg-[color:var(--brand)] px-4 py-2.5 text-sm font-medium text-white hover:bg-[color:var(--brand-hover)] disabled:opacity-60"
      [disabled]="busy()"
    >
      {{ busy() ? 'Signing in…' : 'Sign in' }}
    </button>
  </form>

  <p class="mt-6 text-center text-sm">
    <a
      routerLink="/"
      class="font-medium text-[color:var(--link)] hover:text-[color:var(--link-hover)]"
    >
      ← Back to issues
    </a>
  </p>
</div>
