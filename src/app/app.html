<div
  class="flex min-h-dvh flex-col bg-gradient-to-b from-slate-50 to-slate-100 text-slate-900 dark:from-slate-950 dark:to-slate-900 dark:text-slate-100"
>
  <header
    class="sticky top-0 z-10 border-b border-slate-200/80 bg-white/90 backdrop-blur-md dark:border-slate-800 dark:bg-slate-900/90"
  >
    <div
      class="mx-auto flex max-w-6xl flex-col gap-3 px-4 py-3 sm:flex-row sm:items-center sm:justify-between sm:px-6 lg:px-8"
    >
      <a routerLink="/" class="flex items-center gap-2 text-lg font-semibold">
        <span
          class="flex h-9 w-9 items-center justify-center rounded-xl bg-teal-600 text-sm text-white shadow"
          aria-hidden="true"
          >CA</span
        >
        <span>CivicAlert</span>
      </a>
      <nav
        class="flex flex-wrap items-center gap-1 sm:justify-end"
        aria-label="Main"
      >
        <a
          routerLink="/"
          routerLinkActive="bg-teal-50 text-teal-800 dark:bg-teal-950/50 dark:text-teal-200"
          [routerLinkActiveOptions]="{ exact: true }"
          class="rounded-lg px-3 py-2 text-sm font-medium text-slate-600 hover:bg-slate-100 dark:text-slate-300 dark:hover:bg-slate-800"
        >
          Issues
        </a>
        <a
          routerLink="/moderation"
          routerLinkActive="bg-amber-100 text-amber-900 dark:bg-amber-950/50 dark:text-amber-100"
          class="rounded-lg px-3 py-2 text-sm font-medium text-slate-600 hover:bg-slate-100 dark:text-slate-300 dark:hover:bg-slate-800"
        >
          Moderation
        </a>
        <a
          routerLink="/account"
          routerLinkActive="bg-slate-200 text-slate-900 dark:bg-slate-800 dark:text-white"
          class="rounded-lg px-3 py-2 text-sm font-medium text-slate-600 hover:bg-slate-100 dark:text-slate-300 dark:hover:bg-slate-800"
        >
          Account
        </a>
      </nav>
    </div>
  </header>
  <main class="flex-1">
    <router-outlet />
  </main>
  <footer class="border-t border-slate-200/80 py-4 text-center text-xs text-slate-500 dark:border-slate-800 dark:text-slate-400">
    CivicAlert demo — frontend-only persistence via localStorage.
  </footer>
</div>
