<div
  class="flex min-h-dvh flex-col bg-transparent text-[color:var(--text)]"
>
  <header
    class="sticky top-0 z-10 border-b border-[color:var(--line)] bg-[color:var(--panel)] shadow-[0_12px_30px_rgba(74,54,33,0.08)] backdrop-blur-xl"
  >
    <div
      class="mx-auto flex max-w-6xl flex-col gap-3 px-4 py-3 sm:flex-row sm:items-center sm:justify-between sm:px-6 lg:px-8"
    >
      <a routerLink="/" class="flex items-center gap-3 text-lg font-semibold text-[color:var(--text)]">
        <img
          src="/civicalert-logo.png"
          width="36"
          height="36"
          class="h-10 w-10 shrink-0 rounded-2xl border border-white/70 object-cover shadow-[0_10px_24px_rgba(46,34,22,0.14)]"
          alt=""
          decoding="async"
        />
        <span class="tracking-[-0.02em]">CivicAlert</span>
      </a>
      <nav
        class="flex flex-wrap items-center gap-1 sm:justify-end"
        aria-label="Main"
      >
        <a
          routerLink="/"
          routerLinkActive="bg-[color:var(--brand-soft)] text-[color:var(--brand)] shadow-[inset_0_0_0_1px_rgba(15,118,110,0.12)]"
          [routerLinkActiveOptions]="{ exact: true }"
          class="rounded-full px-4 py-2 text-sm font-medium text-[color:var(--muted)] hover:bg-white/80 hover:text-[color:var(--text)]"
        >
          Issues
        </a>
        <a
          routerLink="/moderation"
          routerLinkActive="bg-[#f8e6d5] text-[#9a541e] shadow-[inset_0_0_0_1px_rgba(201,120,50,0.18)]"
          class="rounded-full px-4 py-2 text-sm font-medium text-[color:var(--muted)] hover:bg-white/80 hover:text-[color:var(--text)]"
        >
          Moderation
        </a>
        @if (isAuthenticated()) {
          <a
            routerLink="/account"
            routerLinkActive="bg-[#ede4d8] text-[color:var(--text)] shadow-[inset_0_0_0_1px_rgba(111,91,70,0.14)]"
            class="rounded-full px-4 py-2 text-sm font-medium text-[color:var(--muted)] hover:bg-white/80 hover:text-[color:var(--text)]"
          >
            Account
          </a>
        } @else {
          <a
            routerLink="/login"
            routerLinkActive="bg-[#ede4d8] text-[color:var(--text)] shadow-[inset_0_0_0_1px_rgba(111,91,70,0.14)]"
            class="rounded-full px-4 py-2 text-sm font-medium text-[color:var(--muted)] hover:bg-white/80 hover:text-[color:var(--text)]"
          >
            Sign in
          </a>
        }
      </nav>
    </div>
  </header>
  @if (notices.current(); as notice) {
    <div class="border-b border-[color:var(--line)] bg-[color:var(--panel)]">
      <div class="mx-auto max-w-6xl px-4 py-3 sm:px-6 lg:px-8">
        <div
          class="app-notice flex items-start justify-between gap-3 rounded-2xl border px-4 py-3 text-sm"
          [class.app-notice--success]="notice.tone === 'success'"
          [class.app-notice--error]="notice.tone === 'error'"
          [class.app-notice--warning]="notice.tone === 'warning'"
          [class.app-notice--info]="notice.tone === 'info'"
          role="status"
          aria-live="polite"
        >
          <p class="flex-1">{{ notice.message }}</p>
          <button
            type="button"
            class="rounded-full px-3 py-1 text-xs font-semibold text-[color:inherit] hover:opacity-70"
            (click)="notices.dismiss()"
            aria-label="Dismiss message"
          >
            Dismiss
          </button>
        </div>
      </div>
    </div>
  }
  <main class="flex-1">
    <router-outlet />
  </main>
  <footer class="border-t border-[color:var(--line)] bg-[color:var(--panel)] py-4 text-center text-xs text-[color:var(--muted)]">
    CivicAlert - Alerts by your neighbors, for your neighbors.
  </footer>
</div>
