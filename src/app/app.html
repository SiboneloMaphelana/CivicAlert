<div
  class="flex min-h-dvh flex-col bg-slate-100 text-slate-950 dark:bg-slate-950 dark:text-slate-100"
>
  <header
    class="sticky top-0 z-10 border-b border-slate-300 bg-white/95 shadow-sm backdrop-blur-md dark:border-slate-700 dark:bg-slate-900/95"
  >
    <div
      class="mx-auto flex max-w-6xl flex-col gap-3 px-4 py-3 sm:flex-row sm:items-center sm:justify-between sm:px-6 lg:px-8"
    >
      <a routerLink="/" class="flex items-center gap-2 text-lg font-semibold">
        <img
          src="/civicalert-logo.png"
          width="36"
          height="36"
          class="h-9 w-9 shrink-0 rounded-xl object-cover shadow"
          alt=""
          decoding="async"
        />
        <span>CivicAlert</span>
      </a>
      <nav
        class="flex flex-wrap items-center gap-1 sm:justify-end"
        aria-label="Main"
      >
        <a
          routerLink="/"
          routerLinkActive="bg-teal-100 text-teal-900 dark:bg-teal-900 dark:text-teal-100"
          [routerLinkActiveOptions]="{ exact: true }"
          class="rounded-lg px-3 py-2 text-sm font-medium text-slate-700 hover:bg-slate-200 dark:text-slate-200 dark:hover:bg-slate-800"
        >
          Issues
        </a>
        <a
          routerLink="/moderation"
          routerLinkActive="bg-amber-100 text-amber-950 dark:bg-amber-900 dark:text-amber-100"
          class="rounded-lg px-3 py-2 text-sm font-medium text-slate-700 hover:bg-slate-200 dark:text-slate-200 dark:hover:bg-slate-800"
        >
          Moderation
        </a>
        @if (isAuthenticated()) {
          <a
            routerLink="/account"
            routerLinkActive="bg-slate-200 text-slate-950 dark:bg-slate-700 dark:text-white"
            class="rounded-lg px-3 py-2 text-sm font-medium text-slate-700 hover:bg-slate-200 dark:text-slate-200 dark:hover:bg-slate-800"
          >
            Account
          </a>
        } @else {
          <a
            routerLink="/login"
            routerLinkActive="bg-slate-200 text-slate-950 dark:bg-slate-700 dark:text-white"
            class="rounded-lg px-3 py-2 text-sm font-medium text-slate-700 hover:bg-slate-200 dark:text-slate-200 dark:hover:bg-slate-800"
          >
            Sign in
          </a>
        }
      </nav>
    </div>
  </header>
  <main class="flex-1">
    <router-outlet />
  </main>
  <footer class="border-t border-slate-300 bg-white/80 py-4 text-center text-xs text-slate-600 dark:border-slate-700 dark:bg-slate-900/80 dark:text-slate-400">
    CivicAlert - Alerts by your neighbors, for your neighbors.
  </footer>
</div>
